scalar JSON

type ServiceHealth {
    ok: Boolean
    status: Int
    message: String
}

type Health {
    auth: ServiceHealth
    member: ServiceHealth
    field: ServiceHealth
    booking: ServiceHealth
    notification: ServiceHealth
}

type Field {
    id: ID
    name: String
    type: String
    description: String
    location: String
    price_per_hour: Float
    status: String
    open_time: String
    close_time: String
    created_at: String
    updated_at: String
}

type FieldMutationPayload {
    success: Boolean
    message: String
    field: Field
    errors: JSON
}

type Booking {
    id: ID
    member_id: ID
    member_user_id: ID
    member_name: String
    member_email: String
    field_id: ID
    field_name: String
    field_type: String
    booking_date: String
    start_time: String
    end_time: String
    duration_hours: Int
    price_per_hour: Float
    total_price: Float
    status: String
    note: String
    rejection_reason: String
    approved_at: String
    rejected_at: String
    canceled_at: String
    approved_by: String
    rejected_by: String
    canceled_by: String
    created_at: String
    updated_at: String
}

type BookingListPayload {
    success: Boolean
    message: String
    bookings: [Booking]
    errors: JSON
}

type BookingSinglePayload {
    success: Boolean
    message: String
    booking: Booking
    errors: JSON
}

type BookingMutationPayload {
    success: Boolean
    message: String
    booking: Booking
    errors: JSON
}

type Query {
    health: Health

    fields(type: String, status: String, search: String): [Field]

    availableFields: [Field]

    field(id: ID!): Field

    fieldSchedule(id: ID!, date: String): JSON

    bookings(
        status: String
        booking_date: String
        field_id: ID
        member_id: ID
        search: String
    ): BookingListPayload

    booking(id: ID!): BookingSinglePayload

    myBookings: BookingListPayload

    myBookingHistory: BookingListPayload

    bookingRequests: BookingListPayload

    fieldBookingSchedule(
        field_id: ID!
        date: String
        status: String
    ): BookingListPayload

    bookingsByMember(member_id: ID!): BookingListPayload
}

type Mutation {
    createField(
        name: String!
        type: String!
        description: String
        location: String
        price_per_hour: Float!
        status: String
        open_time: String
        close_time: String
    ): FieldMutationPayload

    updateField(
        id: ID!
        name: String!
        type: String!
        description: String
        location: String
        price_per_hour: Float!
        status: String!
        open_time: String
        close_time: String
    ): FieldMutationPayload

    updateFieldStatus(id: ID!, status: String!): FieldMutationPayload

    deleteField(id: ID!): FieldMutationPayload

    createBooking(
        field_id: ID!
        booking_date: String!
        start_time: String!
        end_time: String!
        note: String
    ): BookingMutationPayload

    approveBooking(id: ID!): BookingMutationPayload

    rejectBooking(id: ID!, rejection_reason: String): BookingMutationPayload

    cancelBooking(id: ID!): BookingMutationPayload
}

schema {
    query: Query
    mutation: Mutation
}
