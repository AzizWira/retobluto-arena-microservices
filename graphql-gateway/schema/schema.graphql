scalar JSON

type ServiceHealth {
    ok: Boolean
    status: Int
    message: String
}

type Health {
    auth: ServiceHealth
    member: ServiceHealth
    field: ServiceHealth
    booking: ServiceHealth
    notification: ServiceHealth
}

type User {
    id: ID
    name: String
    email: String
    role: String
    is_verified: Boolean
    email_verified_at: String
    created_at: String
    updated_at: String
}

type Member {
    id: ID
    user_id: ID
    name: String
    email: String
    phone: String
    address: String
    status: String
    created_at: String
    updated_at: String
}

type Field {
    id: ID
    name: String
    type: String
    description: String
    location: String
    price_per_hour: Float
    status: String
    open_time: String
    close_time: String
    created_at: String
    updated_at: String
}

type Booking {
    id: ID
    member_id: ID
    member_user_id: ID
    member_name: String
    member_email: String
    field_id: ID
    field_name: String
    field_type: String
    booking_date: String
    start_time: String
    end_time: String
    duration_hours: Int
    price_per_hour: Float
    total_price: Float
    status: String
    note: String
    rejection_reason: String
    approved_at: String
    rejected_at: String
    canceled_at: String
    approved_by: String
    rejected_by: String
    canceled_by: String
    created_at: String
    updated_at: String
}

type NotificationLog {
    id: ID
    recipient_email: String
    type: String
    subject: String
    message: String
    status: String
    payload: JSON
    sent_at: String
    error_message: String
    created_at: String
    updated_at: String
}

type FieldMutationPayload {
    success: Boolean
    message: String
    field: Field
    errors: JSON
}

type BookingListPayload {
    success: Boolean
    message: String
    bookings: [Booking]
    errors: JSON
}

type BookingSinglePayload {
    success: Boolean
    message: String
    booking: Booking
    errors: JSON
}

type BookingMutationPayload {
    success: Boolean
    message: String
    booking: Booking
    errors: JSON
}

type AuthPayload {
    success: Boolean
    message: String
    valid: Boolean
    user: User
    data: JSON
    errors: JSON
}

type AdminCreateMemberPayload {
    success: Boolean
    message: String
    user: User
    member: Member
    data: JSON
    errors: JSON
}

type MemberListPayload {
    success: Boolean
    message: String
    members: [Member]
    errors: JSON
}

type MemberSinglePayload {
    success: Boolean
    message: String
    member: Member
    errors: JSON
}

type MemberMutationPayload {
    success: Boolean
    message: String
    member: Member
    data: JSON
    errors: JSON
}

type NotificationLogListPayload {
    success: Boolean
    message: String
    logs: [NotificationLog]
    errors: JSON
}

type NotificationLogSinglePayload {
    success: Boolean
    message: String
    log: NotificationLog
    errors: JSON
}

type DashboardSummary {
    success: Boolean
    message: String

    fields_total: Int
    fields_available: Int
    fields_maintenance: Int
    fields_inactive: Int

    members_total: Int
    members_active: Int
    members_inactive: Int
    members_blocked: Int

    bookings_total: Int
    bookings_pending: Int
    bookings_approved: Int
    bookings_rejected: Int
    bookings_canceled: Int

    notifications_total: Int
    notifications_sent: Int
    notifications_failed: Int

    errors: JSON
}

type Query {
    health: Health

    me: AuthPayload
    validateToken: AuthPayload

    fields(type: String, status: String, search: String): [Field]

    availableFields: [Field]

    field(id: ID!): Field

    fieldSchedule(id: ID!, date: String): JSON

    bookings(
        status: String
        booking_date: String
        field_id: ID
        member_id: ID
        search: String
    ): BookingListPayload

    booking(id: ID!): BookingSinglePayload

    myBookings: BookingListPayload

    myBookingHistory: BookingListPayload

    bookingRequests: BookingListPayload

    fieldBookingSchedule(
        field_id: ID!
        date: String
        status: String
    ): BookingListPayload

    bookingsByMember(member_id: ID!): BookingListPayload

    members(status: String, search: String): MemberListPayload

    member(id: ID!): MemberSinglePayload

    memberByUserId(user_id: ID!): MemberSinglePayload

    myProfile: MemberSinglePayload

    notificationLogs(
        type: String
        status: String
        search: String
    ): NotificationLogListPayload

    notificationLog(id: ID!): NotificationLogSinglePayload

    dashboardSummary: DashboardSummary
}

type Mutation {
    createField(
        name: String!
        type: String!
        description: String
        location: String
        price_per_hour: Float!
        status: String
        open_time: String
        close_time: String
    ): FieldMutationPayload

    updateField(
        id: ID!
        name: String!
        type: String!
        description: String
        location: String
        price_per_hour: Float!
        status: String!
        open_time: String
        close_time: String
    ): FieldMutationPayload

    updateFieldStatus(id: ID!, status: String!): FieldMutationPayload

    deleteField(id: ID!): FieldMutationPayload

    createBooking(
        field_id: ID!
        booking_date: String!
        start_time: String!
        end_time: String!
        note: String
    ): BookingMutationPayload

    approveBooking(id: ID!): BookingMutationPayload

    rejectBooking(id: ID!, rejection_reason: String): BookingMutationPayload

    cancelBooking(id: ID!): BookingMutationPayload

    adminCreateMember(
        name: String!
        email: String!
        password: String!
        phone: String
        address: String
    ): AdminCreateMemberPayload

    deleteMemberAuthAccount(user_id: ID, email: String): AuthPayload

    updateProfile(
        name: String
        phone: String
        address: String
    ): MemberMutationPayload

    updateMember(
        id: ID!
        user_id: ID
        name: String!
        email: String!
        phone: String
        address: String
        status: String!
    ): MemberMutationPayload

    updateMemberStatus(id: ID!, status: String!): MemberMutationPayload

    deleteMember(id: ID!): MemberMutationPayload
}

schema {
    query: Query
    mutation: Mutation
}
